<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Task Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-250 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-red-950 text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

      <h1 class="text-2xl font-bold">
        Student Task Tracker
      </h1>

      <ul class="hidden md:flex gap-6">
        <li><a href="#" class="hover:text-yellow-300">Home</a></li>
        <li><a href="#" class="hover:text-yellow-300">Tasks</a></li>
        <li><a href="#" class="hover:text-yellow-300">Contact</a></li>
      </ul>

    </div>
  </nav>


  <!-- Hero Section -->
  <section class="bg-red-900 text-white py-16">

    <div class="max-w-4xl mx-auto text-center px-6">

      <h2 class="text-4xl md:text-5xl font-bold mb-4">
        Simplify Your Daily Schedule.
      </h2>

      <p class="text-lg md:text-xl">
        Add tasks, manage deadlines, and stay productive every day.
      </p>

    </div>

  </section>


  <!-- Form Section -->
  <section class="max-w-3xl mx-auto px-6 py-10">

    <div class="bg-white p-6 rounded-2xl shadow-xl">

      <h3 class="text-2xl font-bold text-center mb-6">
        Add New Task
      </h3>

      <!-- Error Messge -->
      <p id="errorMessage"
         class="hidden bg-red-100 text-red-700 p-3 rounded-lg mb-4">
      </p>

      <!-- Form -->
      <form id="taskForm"
            class="flex flex-col md:flex-row gap-4">

        <!-- Task Name -->
        <input
          type="text"
          id="taskInput"
          placeholder="Enter task name"
          class="flex-1 border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        <!--pick  Date -->
        <input
          type="date"
          id="dateInput"
          class="border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />


        <button
          type="submit"
          class="bg-red-950 hover:bg-red-900 text-white px-6 py-3 rounded-lg transition duration-300">
          Add Task
        </button>

      </form>

    </div>

  </section>


  <!-- Task Display Section -->
  <section class="max-w-6xl mx-auto px-6 pb-10">

    <h3 class="text-3xl font-bold text-center mb-8">
      Your Tasks
    </h3>

    <!-- Tasks Container -->
    <div id="taskContainer"
         class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    </div>

  </section>

</body>
</html>
